<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Kho Acc & Mốc Giờ</title>
    <!-- Tailwind CSS để giao diện đẹp -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SweetAlert2 để làm Popup chọn tính năng -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto space-y-8">
        <!-- KHU VỰC 1: QUẢN LÝ KHO ACC -->
        <div class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-2xl font-bold mb-4 text-gray-800 flex items-center gap-2">
                📦 Kho Tài Khoản Hiện Tại
            </h2>
            
            <!-- Danh sách tài khoản hiển thị -->
            <div id="accList" class="space-y-3">
                <p class="text-gray-500 italic text-center">Đang tải dữ liệu tài khoản...</p>
            </div>
        </div>

        <!-- KHU VỰC 2: HÀNG ĐỢI LƯU TẠM (ĐỢI NOTE + BỘ ĐẾM GIỜ) -->
        <div class="bg-yellow-50 p-6 rounded-lg shadow-md border border-yellow-200">
            <h2 class="text-xl font-bold mb-2 text-yellow-800 flex items-center gap-2">
                ⏳ Hàng Đợi Ghi Chú (Tạm thời)
            </h2>
            <p class="text-xs text-yellow-700 mb-4">Tài khoản được giữ lại ở đây để note thông tin. Có bộ đếm thời gian thực để bạn theo dõi thời gian xử lý.</p>
            
            <div id="tempQueueList" class="space-y-3">
                <p class="text-gray-400 italic text-center text-sm">Chưa có tài khoản nào trong hàng đợi.</p>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // CẤU HÌNH FIREBASE CỦA BẠN
        const firebaseConfig = {
            databaseURL: "https://qli-kho-ec-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Mảng lưu trữ các mốc thời gian phục vụ bộ đếm chạy realtime
        let activeTimers = {};

        // 1. THEO DÕI KHO ACC CHÍNH
        db.ref('accounts').on('value', (snapshot) => {
            const accListDiv = document.getElementById('accList');
            accListDiv.innerHTML = '';
            const data = snapshot.val();

            if (!data) {
                accListDiv.innerHTML = `<p class="text-gray-500 italic text-center">Kho trống, vui lòng thêm tài khoản!</p>`;
                return;
            }

            Object.keys(data).forEach(key => {
                const acc = data[key];
                accListDiv.innerHTML += `
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center p-4 bg-gray-50 border rounded-lg gap-3">
                        <div>
                            <span class="font-mono bg-blue-100 text-blue-800 px-2 py-1 rounded text-sm font-semibold">${acc.type || 'Chưa phân loại'}</span>
                            <p class="text-gray-700 font-medium mt-1 break-all">${acc.content}</p>
                        </div>
                        <button onclick="handleGetAcc('${key}', '${encodeURIComponent(acc.content)}', '${acc.type || ''}')" 
                                class="w-full sm:w-auto px-4 py-2 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition duration-200">
                            🔑 Lấy Acc
                        </button>
                    </div>
                `;
            });
        });

        // 2. THEO DÕI HÀNG ĐỢI LƯU TẠM (NOTE + TIMER)
        db.ref('temp_queue').on('value', (snapshot) => {
            const queueDiv = document.getElementById('tempQueueList');
            queueDiv.innerHTML = '';
            const data = snapshot.val();

            if (!data) {
                queueDiv.innerHTML = `<p class="text-gray-400 italic text-center text-sm">Chưa có tài khoản nào trong hàng đợi.</p>`;
                // Xóa bỏ tất cả bộ đếm thời gian cũ nếu hàng đợi trống
                Object.keys(activeTimers).forEach(k => clearInterval(activeTimers[k]));
                activeTimers = {};
                return;
            }

            // Dọn dẹp các bộ đếm không còn tồn tại trong data mới
            Object.keys(activeTimers).forEach(k => {
                if (!data[k]) {
                    clearInterval(activeTimers[k]);
                    delete activeTimers[k];
                }
            });

            Object.keys(data).forEach(key => {
                const item = data[key];
                const movedAt = item.movedAt || Date.now();

                queueDiv.innerHTML += `
                    <div class="p-4 bg-white border border-yellow-300 rounded-lg shadow-sm space-y-3">
                        <div class="flex justify-between items-start flex-wrap gap-2">
                            <p class="text-gray-800 font-mono text-sm break-all font-semibold bg-gray-100 p-2 rounded flex-1 min-w-[200px]">${item.content}</p>
                            <div class="flex flex-col items-end gap-1">
                                <span class="bg-yellow-200 text-yellow-800 text-xs px-2 py-1 rounded font-bold">${item.type || 'Acc'}</span>
                                <!-- Vị trí hiển thị bộ đếm thời gian -->
                                <span id="timer-${key}" class="text-xs bg-gray-800 text-green-400 font-mono px-2 py-0.5 rounded shadow">⏱️ 00:00</span>
                            </div>
                        </div>
                        
                        <!-- Hệ thống 2 ô ghi chú -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                            <div>
                                <label class="text-xs font-semibold text-gray-500">Mục ghi chú 1 (Lý do/Trạng thái):</label>
                                <input id="note1-${key}" type="text" placeholder="Ví dụ: Acc lỗi, Sai pass..." value="${item.note || ''}" 
                                       class="w-full mt-0.5 px-3 py-1.5 text-sm border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-yellow-500">
                            </div>
                            <div>
                                <label class="text-xs font-semibold text-gray-500">Mục ghi chú 2 (Thông tin thêm):</label>
                                <input id="note2-${key}" type="text" placeholder="Ví dụ: Đã đổi mail, Khách nguyễn văn a..." value="${item.note2 || ''}" 
                                       class="w-full mt-0.5 px-3 py-1.5 text-sm border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-yellow-500">
                            </div>
                        </div>

                        <div class="flex justify-between items-center pt-2 border-t border-dashed border-gray-200">
                            <div class="space-x-4 text-xs">
                                <button onclick="copyToClipboard('${encodeURIComponent(item.content)}')" class="text-blue-600 font-medium hover:underline">📋 Copy lại</button>
                                <button onclick="saveNotes('${key}')" class="text-green-600 font-bold hover:underline">💾 Lưu 2 Note</button>
                            </div>
                            <button onclick="deleteFromQueue('${key}')" class="text-red-600 font-bold text-xs hover:underline">❌ Xóa vĩnh viễn</button>
                        </div>
                    </div>
                `;

                // Khởi tạo bộ đếm thời gian Realtime chạy cho acc này
                if (!activeTimers[key]) {
                    activeTimers[key] = setInterval(() => {
                        const now = Date.now();
                        const diff = now - movedAt;

                        const minutes = Math.floor(diff / 60000);
                        const seconds = Math.floor((diff % 60000) / 1000);

                        const strMinutes = String(minutes).padStart(2, '0');
                        const strSeconds = String(seconds).padStart(2, '0');

                        const timerEl = document.getElementById(`timer-${key}`);
                        if (timerEl) {
                            timerEl.innerText = `⏱️ ${strMinutes}:${strSeconds}`;
                        }
                    }, 1000);
                }
            });
        });

        // 3. XỬ LÝ NÚT LẤY ACC
        function handleGetAcc(key, encodedContent, type) {
            const content = decodeURIComponent(encodedContent);

            Swal.fire({
                title: '⚡ LỰA CHỌN XỬ LÝ ACC',
                html: `<div class="text-left text-sm text-gray-600 bg-gray-100 p-3 rounded mb-4 break-all font-mono">${content}</div>`,
                showDenyButton: true,
                showCancelButton: true,
                confirmButtonText: '📋 Copy & Xóa Luôn',
                denyButtonText: '💾 Copy & Lưu Tạm (Để Note)',
                cancelButtonText: 'Hủy bỏ',
                confirmButtonColor: '#e11d48',
                denyButtonColor: '#d97706',
            }).then((result) => {
                if (result.isConfirmed) {
                    navigator.clipboard.writeText(content).then(() => {
                        db.ref('accounts/' + key).remove().then(() => {
                            Swal.fire('Thành công!', 'Đã copy và xóa khỏi kho chính.', 'success');
                        });
                    });
                } else if (result.isDenied) {
                    navigator.clipboard.writeText(content).then(() => {
                        db.ref('temp_queue').push({
                            content: content,
                            type: type,
                            note: "",
                            note2: "", // Thêm trường note thứ 2 lên Firebase
                            movedAt: firebase.database.ServerValue.TIMESTAMP // Lưu mốc thời gian máy chủ để đếm giây
                        }).then(() => {
                            db.ref('accounts/' + key).remove().then(() => {
                                Swal.fire('Đã Lưu Tạm!', 'Đã chuyển xuống "Hàng Đợi Ghi Chú" để bạn theo dõi thời gian và điền note.', 'info');
                            });
                        });
                    });
                }
            });
        }

        // HÀM LƯU ĐỒNG THỜI CẢ 2 MỤC GHI CHÚ
        function saveNotes(key) {
            const note1Value = document.getElementById(`note1-${key}`).value;
            const note2Value = document.getElementById(`note2-${key}`).value;
            
            db.ref('temp_queue/' + key).update({
                note: note1Value,
                note2: note2Value
            }).then(() => {
                Swal.fire({
                    toast: true,
                    position: 'top-end',
                    icon: 'success',
                    title: 'Đã lưu cả 2 ghi chú!',
                    showConfirmButton: false,
                    timer: 1500
                });
            });
        }

        // HÀM XÓA ACC KHỎI HÀNG ĐỢI
        function deleteFromQueue(key) {
            Swal.fire({
                title: 'Xóa vĩnh viễn?',
                text: "Acc và mọi ghi chú đi kèm sẽ bị xóa hoàn toàn!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#3085d6',
                cancelButtonColor: '#d33',
                confirmButtonText: 'Đồng ý xóa'
            }).then((result) => {
                if (result.isConfirmed) {
                    // Xóa bộ đếm trên trình duyệt trước
                    if(activeTimers[key]) {
                        clearInterval(activeTimers[key]);
                        delete activeTimers[key];
                    }
                    db.ref('temp_queue/' + key).remove().then(() => {
                        Swal.fire('Đã xóa!', 'Dữ liệu đã dọn dẹp sạch.', 'success');
                    });
                }
            });
        }

        // HÀM COPY PHỤ LỢI ÍCH
        function copyToClipboard(encodedContent) {
            const content = decodeURIComponent(encodedContent);
            navigator.clipboard.writeText(content).then(() => {
                Swal.fire({
                    toast: true,
                    position: 'top-end',
                    icon: 'success',
                    title: 'Đã copy lại!',
                    showConfirmButton: false,
                    timer: 1000
                });
            });
        }
    </script>
</body>
</html>
