<!DOCTYPE html>
<html lang="vi">
<head>
    <!-- [GIỮ NGUYÊN CÁC META TAG VÀ CSS CỦA BẠN] -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Trị & Thông Báo Telegram Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { -webkit-tap-highlight-color: transparent; user-select: none; } input { user-select: text; }</style>
</head>
<body class="bg-gray-100 text-gray-800 dark:bg-gray-950 dark:text-gray-100 font-sans antialiased">

    <!-- [GIỮ NGUYÊN PHẦN LOGIN SCREEN VÀ CÁC DIV HIỂN THỊ KHÁC] -->
    
    <!-- FORM UP ACC (Đã thêm ô Ghi chú) -->
    <form id="accForm" class="space-y-4">
        <!-- [CÁC INPUT CŨ: User, Pass, MP] -->
        <input type="text" id="accUser" required placeholder="Tài khoản" class="w-full px-3 py-2.5 border rounded-xl bg-gray-50 dark:bg-gray-950">
        <input type="text" id="accPass" required placeholder="Mật khẩu" class="w-full px-3 py-2.5 border rounded-xl bg-gray-50 dark:bg-gray-950">
        <input type="text" id="accMp" required placeholder="Thông tin MP" class="w-full px-3 py-2.5 border rounded-xl bg-gray-50 dark:bg-gray-950">
        <input type="text" id="accNote" placeholder="Ghi chú cho acc..." class="w-full px-3 py-2.5 border rounded-xl bg-gray-50 dark:bg-gray-950">
        <button type="submit" id="btnSubmitAcc" class="w-full bg-blue-600 text-white font-bold py-2.5 rounded-xl">Đồng Bộ Lên Kho & Báo Bot</button>
    </form>

    <script type="module">
        // [CÁC IMPORT CỦA BẠN]
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        // ... (Cấu hình Firebase của bạn) ...

        // HÀM XỬ LÝ SUBMIT (Đã thêm Ghi chú & Đếm giờ)
        document.getElementById('accForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('accUser').value.trim();
            const pass = document.getElementById('accPass').value.trim();
            const mp = document.getElementById('accMp').value.trim();
            const note = document.getElementById('accNote').value.trim();
            const timeUp = new Date().toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'});

            set(push(dbRef), { user, pass, mp, note, timeUp }).then(() => {
                document.getElementById('accForm').reset();
                // [GIỮ NGUYÊN LOGIC CŨ BÊN DƯỚI]
                const currentTotal = localAccCache.length + 1;
                const msg = `📥 *THÔNG BÁO TỪ SERVER: ${currentUserName.toUpperCase()}*\n` +
                            `⚙️ *Hành động:* Thêm (Up) tài khoản mới\n` +
                            `📧 *Tài khoản:* \`${user}\`\n` +
                            `🔑 *Mật khẩu:* \`${pass}\`\n` +
                            `💎 *Thông tin MP:* ${mp}\n` +
                            `📝 *Ghi chú:* ${note || 'Không có'}\n` +
                            `⏰ *Giờ Up:* ${timeUp}\n` +
                            `📈 *Tổng số lượng trong kho:* \`${currentTotal}\` acc.`;
                sendTelegramNotification(msg);
            });
        });

        // HÀM RENDER TABLE (Thêm nút Xuất với 2 chọn lựa)
        function renderAccTable(dataToRender) {
            accTableBody.innerHTML = '';
            dataToRender.forEach((acc) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${acc.user}</td>
                    <td>${acc.mp} <br> <span class="text-xs text-gray-500">${acc.note || ''}</span></td>
                    <td class="text-blue-500">${acc.timeUp || ''}</td>
                    <td><button class="btn-export" data-id="${acc.id}" data-acc="${acc.user}|${acc.pass}">Xuất</button></td>
                `;
                accTableBody.appendChild(tr);
            });

            // Logic chọn 2 mục khi xuất
            document.querySelectorAll('.btn-export').forEach(btn => {
                btn.onclick = () => {
                    const id = btn.getAttribute('data-id');
                    const accInfo = btn.getAttribute('data-acc');
                    
                    // Logic chọn 2 mục theo ý bạn
                    if(confirm("1. OK = Copy & Xoá\n2. Cancel = Copy & Đưa vào mục chờ (Note lại)")) {
                        navigator.clipboard.writeText(accInfo);
                        remove(ref(database, 'accounts/' + id));
                    } else {
                        navigator.clipboard.writeText(accInfo);
                        // Đẩy vào nhánh 'waiting' để note lại
                        set(ref(database, 'waiting/' + id), { info: accInfo, time: new Date().toLocaleString() });
                        remove(ref(database, 'accounts/' + id));
                    }
                };
            });
        }
    </script>
</body>
</html>
